# HermesKatana built-in policy preset: permissive
# Source of truth for PolicyEngine.with_defaults(); keep in sync via tests.

name: permissive
version: 1.0.0
description: 'Minimal friction: log all tainted tool calls but only hard-block obvious exfiltration patterns.'
author: HermesKatana
metadata:
  security_level: low
  recommended_for: experimentation
policies:
- name: permissive_terminal_exfil_curl
  description: Block curl/wget with tainted data (exfiltration).
  tool_pattern: terminal
  conditions:
  - field: command
    operator: matches_pattern
    value: .*(curl|wget)\s+.*
  - field: '*'
    operator: contains_taint
    value: true
  action: deny
  priority: 100
  tags:
  - exfiltration
  - critical
- name: permissive_terminal_exfil_netcat
  description: Block netcat/ncat/socat with tainted data.
  tool_pattern: terminal
  conditions:
  - field: command
    operator: matches_pattern
    value: .*(nc|ncat|socat)\s+.*
  - field: '*'
    operator: contains_taint
    value: true
  action: deny
  priority: 100
  tags:
  - exfiltration
  - critical
- name: permissive_terminal_exfil_ssh
  description: Block ssh/scp/sftp with tainted data.
  tool_pattern: terminal
  conditions:
  - field: command
    operator: matches_pattern
    value: .*(ssh|scp|sftp|rsync)\s+.*
  - field: '*'
    operator: contains_taint
    value: true
  action: deny
  priority: 100
  tags:
  - exfiltration
  - critical
- name: permissive_terminal_exfil_dns
  description: Block DNS-based exfiltration with tainted data.
  tool_pattern: terminal
  conditions:
  - field: command
    operator: matches_pattern
    value: .*(dig|nslookup|host)\s+.*
  - field: '*'
    operator: contains_taint
    value: true
  action: deny
  priority: 100
  tags:
  - exfiltration
  - critical
- name: permissive_terminal_tainted_log
  description: Log all other tainted terminal calls.
  tool_pattern: terminal
  conditions:
  - field: '*'
    operator: contains_taint
    value: true
  action: log_only
  priority: 50
  tags:
  - side-effect
- name: permissive_send_message_exfil
  description: Block send_message when content source is web_content.
  tool_pattern: send_message
  conditions:
  - field: '*'
    operator: source_is
    value: web_content
  action: deny
  priority: 100
  tags:
  - exfiltration
- name: permissive_send_message_tainted_log
  description: Log tainted send_message calls from other sources.
  tool_pattern: send_message
  conditions:
  - field: '*'
    operator: contains_taint
    value: true
  action: log_only
  priority: 50
  tags:
  - side-effect
- name: permissive_skill_manage_web_taint
  description: Block skill modifications sourced from web content.
  tool_pattern: skill_manage
  conditions:
  - field: '*'
    operator: source_is
    value: web_content
  action: deny
  priority: 100
  tags:
  - code-execution
  - critical
- name: permissive_skill_manage_log
  description: Log all other skill modifications with taint.
  tool_pattern: skill_manage
  conditions:
  - field: '*'
    operator: contains_taint
    value: true
  action: log_only
  priority: 50
  tags:
  - code-execution
- name: permissive_memory_web_taint
  description: Escalate memory writes sourced from web content.
  tool_pattern: memory
  conditions:
  - field: '*'
    operator: source_is
    value: web_content
  action: escalate
  priority: 90
  tags:
  - persistence
- name: permissive_delegate_log
  description: Log delegated tasks with tainted instructions.
  tool_pattern: delegate_task
  conditions:
  - field: '*'
    operator: contains_taint
    value: true
  action: log_only
  priority: 50
  tags:
  - lateral-movement
- name: permissive_cronjob_tainted
  description: Escalate cron jobs with tainted payloads.
  tool_pattern: cronjob
  conditions:
  - field: '*'
    operator: contains_taint
    value: true
  action: escalate
  priority: 90
  tags:
  - persistence
- name: permissive_catchall_tainted
  description: Log any tainted tool call not matched above.
  tool_pattern: '*'
  conditions:
  - field: '*'
    operator: contains_taint
    value: true
  action: log_only
  priority: 5
  tags:
  - catchall
- name: permissive_catchall_clean
  description: Log unknown clean tool calls for audit trail.
  tool_pattern: '*'
  conditions: []
  action: log_only
  priority: 1
  tags:
  - catchall
  - unknown-tool
