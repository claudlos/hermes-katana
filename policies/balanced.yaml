- name: balanced_readonly_allow
  description: "Allow read-only tools always \u2014 no side effects."
  tool_pattern: read_file
  conditions: []
  action: allow
  priority: 50
  tags:
  - read-only
- name: balanced_search_allow
  description: "Allow search_files always \u2014 read-only reconnaissance is fine."
  tool_pattern: search_files
