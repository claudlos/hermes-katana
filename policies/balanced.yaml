# HermesKatana built-in policy preset: balanced
# Source of truth for PolicyEngine.with_defaults(); keep in sync via tests.

name: balanced
version: 3.0.0
description: 'Smart defaults: allow clean calls without hesitation, block dangerous tainted tools, escalate
  ambiguous cases, and use taint-level gradients (1-3 low, 4-6 medium, 7-10 high) for nuanced decisions.
  Benign commands (ls, cat, git status, pip install, etc.) are allowed even with mild taint.'
author: HermesKatana
metadata:
  security_level: moderate
  recommended_for: development
  taint_levels:
    low: '1-3: allow benign ops, log-only for reads'
    medium: '4-6: escalate side-effects, allow reads'
    high: '7-10: deny dangerous, escalate everything else'
policies:
- name: balanced_terminal_exfil_pattern
  description: Block terminal commands matching exfiltration patterns when tainted.
  tool_pattern: terminal
  conditions:
  - field: command
    operator: matches_pattern
    value: .*(curl|wget|nc|ncat|ssh|scp|ftp|rsync|socat)\s+.*
  - field: '*'
    operator: contains_taint
    value: true
  action: deny
  priority: 120
  tags:
  - exfiltration
  - critical
- name: balanced_terminal_dangerous_high_taint
  description: Block terminal with dangerous patterns AND high taint (level >= 7).
  tool_pattern: terminal
  conditions:
  - field: command
    operator: matches_pattern
    value: .*(rm\s+-rf|mkfs|dd\s+if=|chmod\s+777|>\s*/etc/|eval\s|base64\s+-d).*
  - field: '*'
    operator: taint_level_gte
    value: 7
  action: deny
  priority: 115
  tags:
  - side-effect
  - critical
  - high-taint
- name: balanced_terminal_dangerous_medium_taint
  description: Escalate terminal with dangerous patterns AND medium taint (4-6).
  tool_pattern: terminal
  conditions:
  - field: command
    operator: matches_pattern
    value: .*(rm\s+-rf|mkfs|dd\s+if=|chmod\s+777|>\s*/etc/|eval\s|base64\s+-d).*
  - field: '*'
    operator: taint_level_gte
    value: 4
  action: escalate
  priority: 110
  tags:
  - side-effect
  - critical
  - medium-taint
- name: balanced_terminal_benign_low_taint
  description: Allow benign commands (ls, cat, echo, pwd, pip, npm, git status/log/diff, etc.) even with
    low taint (level <= 3). These have no meaningful side effects.
  tool_pattern: terminal
  conditions:
  - field: command
    operator: matches_pattern
    value: ^\s*(sudo\s+)?(ls|cat|echo|pwd|cd|head|tail|wc|sort|uniq|grep|find|which|whoami|date|env|printenv|uname|df|du|free|ps|top|file|stat|id|hostname|uptime|tree|less|more|diff|basename|dirname|realpath|python3?|node|cargo|rustc|make|cmake)\b.*
  - field: '*'
    operator: taint_level_lte
    value: 3
  action: allow
  priority: 105
  tags:
  - benign-whitelist
  - low-taint
- name: balanced_terminal_git_readonly_low_taint
  description: Allow read-only git subcommands with low taint. Write ops (push, commit, stash, reset)
    are excluded.
  tool_pattern: terminal
  conditions:
  - field: command
    operator: matches_pattern
    value: ^\s*(sudo\s+)?git\s+(status|log|diff|show|branch|tag|remote|describe|shortlog|reflog|config|ls-files|ls-tree)\b.*
  - field: '*'
    operator: taint_level_lte
    value: 3
  action: allow
  priority: 105
  tags:
  - benign-whitelist
  - git
  - low-taint
- name: balanced_terminal_pip_npm_low_taint
  description: Allow pip/npm install with low taint (common dev workflow).
  tool_pattern: terminal
  conditions:
  - field: command
    operator: matches_pattern
    value: ^\s*(sudo\s+)?(pip3?|npm|npx|yarn)\s+(install|list|show|info|search|outdated|audit)\b.*
  - field: '*'
    operator: taint_level_lte
    value: 3
  action: allow
  priority: 105
  tags:
  - benign-whitelist
  - package-manager
  - low-taint
- name: balanced_terminal_benign_medium_taint
  description: "Escalate benign commands with medium taint (4-6) \u2014 probably fine but check."
  tool_pattern: terminal
  conditions:
  - field: command
    operator: matches_pattern
    value: ^\s*(sudo\s+)?(ls|cat|echo|pwd|head|tail|wc|grep|find|which|whoami|date|env|git\s+(status|log|diff))\b.*
  - field: '*'
    operator: taint_level_gte
    value: 4
  - field: '*'
    operator: taint_level_lte
    value: 6
  action: escalate
  priority: 100
  tags:
  - benign-whitelist
  - medium-taint
- name: balanced_terminal_high_taint
  description: Deny any terminal call with high taint (level >= 7).
  tool_pattern: terminal
  conditions:
  - field: '*'
    operator: taint_level_gte
    value: 7
  action: deny
  priority: 95
  tags:
  - side-effect
  - critical
  - high-taint
- name: balanced_terminal_medium_taint
  description: Escalate non-benign terminal calls with medium taint (4-6).
  tool_pattern: terminal
  conditions:
  - field: '*'
    operator: taint_level_gte
    value: 4
  action: escalate
  priority: 90
  tags:
  - side-effect
  - medium-taint
- name: balanced_terminal_low_taint
  description: "Escalate non-benign terminal calls with low taint (1-3) \u2014 not whitelisted."
  tool_pattern: terminal
  conditions:
  - field: '*'
    operator: contains_taint
    value: true
  action: escalate
  priority: 85
  tags:
  - side-effect
  - low-taint
- name: balanced_terminal_clean
  description: Allow clean terminal calls (no taint) without hesitation.
  tool_pattern: terminal
  conditions: []
  action: allow
  priority: 10
  tags:
  - side-effect
- name: balanced_write_file_high_taint
  description: Deny file writes with high taint (level >= 7).
  tool_pattern: write_file
  conditions:
  - field: '*'
    operator: taint_level_gte
    value: 7
  action: deny
  priority: 100
  tags:
  - side-effect
  - filesystem
  - high-taint
- name: balanced_write_file_tainted
  description: Escalate file writes with low/medium taint for review.
  tool_pattern: write_file
  conditions:
  - field: '*'
    operator: contains_taint
    value: true
  action: escalate
  priority: 95
  tags:
  - side-effect
  - filesystem
- name: balanced_patch_high_taint
  description: Deny file patches with high taint (level >= 7).
  tool_pattern: patch
  conditions:
  - field: '*'
    operator: taint_level_gte
    value: 7
  action: deny
  priority: 100
  tags:
  - side-effect
  - filesystem
  - high-taint
- name: balanced_patch_tainted
  description: Escalate file patches with low/medium taint.
  tool_pattern: patch
  conditions:
  - field: '*'
    operator: contains_taint
