# =============================================================================
# HermesKatana Policy Set: PARANOID
# =============================================================================
# Maximum security — deny all side-effecting tool calls when any argument
# carries untrusted taint. Even clean terminal calls require human approval.
# Recommended for: production, high-security deployments, financial systems.
# =============================================================================

name: paranoid
version: "1.0.0"
description: >
  Maximum security: deny all side-effecting tool calls when any argument
  carries untrusted taint. Read-only tools are escalated when tainted.
  Even clean terminal calls require human review.
author: HermesKatana
metadata:
  security_level: maximum
  recommended_for: production

policies:

  # ---------------------------------------------------------------------------
  # Terminal — the most dangerous tool (arbitrary code execution)
  # ---------------------------------------------------------------------------

  # Rule 1: Block terminal when ANY argument is tainted
  - name: paranoid_terminal_tainted
    description: >
      Block terminal execution when any argument carries taint.
      Terminal is the highest-risk tool — it can execute arbitrary commands.
    tool_pattern: terminal
    conditions:
      - field: "*"
        operator: contains_taint
        value: true
    action: deny
    priority: 100
    enabled: true
    tags: [side-effect, critical]

  # Rule 2: Even clean terminal calls need human approval
  - name: paranoid_terminal_clean
    description: >
      Escalate even clean terminal calls for human review.
      In paranoid mode, no command runs without explicit approval.
    tool_pattern: terminal
    conditions: []
    action: escalate
    priority: 50
    enabled: true
    tags: [side-effect, critical]

  # ---------------------------------------------------------------------------
  # File system writes — can persist malicious payloads
  # ---------------------------------------------------------------------------

  # Rule 3: Block write_file with tainted content
  - name: paranoid_write_file_tainted
    description: >
      Block file writes when content carries any taint.
      Prevents tainted data from being persisted to disk.
    tool_pattern: write_file
    conditions:
      - field: "*"
        operator: contains_taint
        value: true
    action: deny
    priority: 100
    enabled: true
    tags: [side-effect, filesystem]

  # Rule 4: Block patch with tainted content
  - name: paranoid_patch_tainted
    description: >
      Block file patches when replacement content carries taint.
      Prevents injection of tainted code into existing files.
    tool_pattern: patch
    conditions:
      - field: "*"
        operator: contains_taint
        value: true
    action: deny
    priority: 100
    enabled: true
    tags: [side-effect, filesystem]

  # ---------------------------------------------------------------------------
  # Messaging — exfiltration vector
  # ---------------------------------------------------------------------------

  # Rule 5: Block send_message with tainted data
  - name: paranoid_send_message_tainted
    description: >
      Block outbound messages containing any tainted data.
      Primary defense against data exfiltration via messaging.
    tool_pattern: send_message
    conditions:
      - field: "*"
        operator: contains_taint
        value: true
    action: deny
    priority: 100
    enabled: true
    tags: [side-effect, exfiltration]

  # ---------------------------------------------------------------------------
  # Memory — persistence and poisoning vector
  # ---------------------------------------------------------------------------

  # Rule 6: Block memory mutations with tainted data
  - name: paranoid_memory_write_tainted
    description: >
      Block memory add/replace/remove when data carries taint.
      Prevents memory poisoning from untrusted sources.
    tool_pattern: memory
    conditions:
      - field: "*"
        operator: contains_taint
        value: true
    action: deny
    priority: 100
    enabled: true
    tags: [side-effect, persistence]

  # ---------------------------------------------------------------------------
  # Skill management — code execution and persistence
  # ---------------------------------------------------------------------------

  # Rule 7: Block skill modifications with tainted data
  - name: paranoid_skill_manage_tainted
    description: >
      Block skill installation/modification when data is tainted.
      Prevents injection of malicious skills from untrusted sources.
    tool_pattern: skill_manage
    conditions:
      - field: "*"
        operator: contains_taint
        value: true
    action: deny
    priority: 100
    enabled: true
    tags: [side-effect, code-execution]

  # ---------------------------------------------------------------------------
  # Task delegation — lateral movement vector
  # ---------------------------------------------------------------------------

  # Rule 8: Block delegation with tainted instructions
  - name: paranoid_delegate_tainted
    description: >
      Block task delegation when instructions carry taint.
      Prevents lateral movement through sub-agent spawning.
    tool_pattern: delegate_task
    conditions:
      - field: "*"
        operator: contains_taint
        value: true
    action: deny
    priority: 100
    enabled: true
    tags: [side-effect, lateral-movement]

  # ---------------------------------------------------------------------------
  # Cron jobs — persistence vector
  # ---------------------------------------------------------------------------

  # Rule 9: Block cron jobs with tainted payloads
  - name: paranoid_cronjob_tainted
    description: >
      Block cron job creation when payload carries taint.
      Prevents establishment of persistent backdoors.
    tool_pattern: cronjob
    conditions:
      - field: "*"
        operator: contains_taint
        value: true
    action: deny
    priority: 100
    enabled: true
    tags: [side-effect, persistence]

  # ---------------------------------------------------------------------------
  # Browser interactions — escalate for human review
  # ---------------------------------------------------------------------------

  # Rule 10: Escalate browser clicks with tainted selectors
  - name: paranoid_browser_click_tainted
    description: >
      Escalate browser clicks when selectors carry taint.
      Could be used to trigger unintended actions on web pages.
    tool_pattern: browser_click
    conditions:
      - field: "*"
        operator: contains_taint
        value: true
    action: escalate
    priority: 95
    enabled: true
    tags: [side-effect, browser]

  # Rule 11: Escalate browser typing with tainted text
  - name: paranoid_browser_type_tainted
    description: >
      Escalate browser typing when text content carries taint.
      Could be used to submit forms or enter credentials from tainted sources.
    tool_pattern: browser_type
    conditions:
      - field: "*"
        operator: contains_taint
        value: true
    action: escalate
    priority: 95
    enabled: true
    tags: [side-effect, browser]

  # ---------------------------------------------------------------------------
  # MCP tools — external protocol, inherently untrusted
  # ---------------------------------------------------------------------------

  # Rule 12: Deny any MCP-sourced tool call with taint
  - name: paranoid_mcp_tainted
    description: >
      Deny any tool call with MCP-sourced taint. MCP servers are external
      and their outputs should never flow to side-effecting operations.
    tool_pattern: "*"
    conditions:
      - field: "*"
        operator: has_label
        value: mcp
    action: deny
    priority: 105
    enabled: true
    tags: [mcp, critical]

  # ---------------------------------------------------------------------------
  # Catch-all rules
  # ---------------------------------------------------------------------------

  # Rule 13: Deny any remaining tainted tool call
  - name: paranoid_catchall_tainted
    description: >
      Deny any tool call not matched above that carries taint.
      Safety net ensuring nothing tainted slips through.
    tool_pattern: "*"
    conditions:
      - field: "*"
        operator: contains_taint
        value: true
    action: deny
    priority: 10
    enabled: true
    tags: [catchall]

  # Rule 14: Deny clean calls to unknown tools in paranoid mode
  - name: paranoid_catchall_clean
    description: >
      Deny completely clean calls to unknown tools.
      This is the lowest-priority fallback for fail-closed operation.
    tool_pattern: "*"
    conditions: []
    action: deny
    priority: 1
    enabled: true
    tags: [catchall]
