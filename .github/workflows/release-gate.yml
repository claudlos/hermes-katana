name: Release Gate

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  release-gate:
    name: Build, Test, and Package
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m pip install -e ".[dev,ml,security,hf]"
      - name: Ruff lint
        run: python -m ruff check src/ tests/
      - name: Ruff format check
        run: python -m ruff format --check src/ tests/
      - name: Full tests
        run: PYTHONPATH=src python -m pytest tests/ -q
      - name: Scanner gate
        run: scripts/verify_scanner_change.sh --skip-lint
      - name: Build wheel and sdist
        run: python -m build
      - name: Twine metadata check
        run: python -m twine check dist/*
      - name: Artifact status smoke
        run: PYTHONPATH=src python -m hermes_katana.cli.main artifacts status

  secret-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
