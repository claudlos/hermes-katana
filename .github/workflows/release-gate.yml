name: Release Gate

on:
  workflow_dispatch:
  push:
    branches: [main, master, "release/**"]
  pull_request:
    branches: [main, master, "release/**"]

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  release-gate:
    name: Build, Test, and Package
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      attestations: write
      artifact-metadata: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --no-cache-dir --upgrade pip==26.1.1
          python -m pip install --no-cache-dir build==1.5.0 twine==6.2.0
          python -m pip install --no-cache-dir cyclonedx-bom==7.3.0
          python -m pip install --no-cache-dir -e ".[dev,security,fast-cpu,proving-ground]"
      - name: Ruff lint
        run: python -m ruff check src/ tests/
      - name: Ruff format check
        run: python -m ruff format --check src/ tests/
      - name: Generated policy assets check
        run: python scripts/generate_policy_assets.py --check
      - name: Mypy smoke
        run: scripts/mypy_smoke.sh
      - name: Full tests
        run: PYTHONPATH=src python -m pytest tests/ -q
      - name: Scanner gate
        run: scripts/verify_scanner_change.sh --skip-lint
      - name: Build wheel and sdist
        run: python -m build
      - name: Twine metadata check
        run: python -m twine check dist/*
      - name: Installed wheel policy smoke
        run: |
          python - <<'PY'
          import glob
          import zipfile

          wheel = glob.glob("dist/*.whl")[0]
          required = {
              "hermes_katana/policies/balanced.yaml",
              "hermes_katana/policies/max.yaml",
              "hermes_katana/policies/permissive.yaml",
          }
          with zipfile.ZipFile(wheel) as zf:
              missing = sorted(required - set(zf.namelist()))
          if missing:
              raise SystemExit(f"wheel missing policy YAMLs: {missing}")
          PY
          python -m venv /tmp/katana-wheel-smoke
          /tmp/katana-wheel-smoke/bin/python -m pip install --no-cache-dir --upgrade pip==26.1.1
          /tmp/katana-wheel-smoke/bin/python -m pip install dist/*.whl
          HOME="$(mktemp -d)" PYTHONPATH= /tmp/katana-wheel-smoke/bin/python - <<'PY'
          from hermes_katana.policy.defaults import builtin_policy_path, load_builtin_policy_set
          from hermes_katana.policy.engine import PolicyEngine

          max_path = builtin_policy_path("max")
          path = builtin_policy_path("balanced")
          assert max_path is not None
          assert path is not None
          assert "site-packages/hermes_katana/policies/max.yaml" in str(max_path), max_path
          assert "site-packages/hermes_katana/policies/balanced.yaml" in str(path), path
          assert load_builtin_policy_set("max")["name"] == "max"
          assert load_builtin_policy_set("balanced")["name"] == "balanced"
          assert PolicyEngine.with_defaults("permissive").evaluate("terminal", {"command": "ls"}).action.value == "log_only"
          PY
      - name: Artifact status smoke
        run: PYTHONPATH=src python -m hermes_katana.cli.main artifacts status --all
      - name: Generate CycloneDX SBOM
        run: |
          mkdir -p dist/sbom
          cyclonedx-py environment \
            --pyproject pyproject.toml \
            --mc-type library \
            --sv 1.6 \
            --of JSON \
            -o dist/sbom/hermes-katana.cdx.json \
            /tmp/katana-wheel-smoke/bin/python
      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-dist
          path: |
            dist/*.tar.gz
            dist/*.whl
            dist/sbom/*.json
          if-no-files-found: error
          retention-days: 30
      - name: Attest release artifact provenance
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.whl
      - name: Attest release artifact SBOM
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.whl
          sbom-path: dist/sbom/hermes-katana.cdx.json

  secret-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_CONFIG: .gitleaks.toml
