name: CodeQL

# Audit finding E6: branch protection required the "Analyze (python)" and
# "Analyze (actions)" status checks, but no in-repo workflow produced them, so
# the rule could never be satisfied (or, if GitHub treated the missing context
# as not-required, silently provided no CodeQL coverage). This workflow emits
# exactly those job names ("Analyze (<language>)").

on:
  push:
    branches: [main, master, "release/**"]
  pull_request:
    branches: [main, master, "release/**"]
  schedule:
    - cron: "27 4 * * 1"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, actions]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
          # Default Setup is enabled on this repository; uploading from an
          # advanced workflow at the same time causes a conflict error.
          # Analysis still runs (satisfying required status checks) but SARIF
          # upload is delegated entirely to Default Setup.
          upload: never
