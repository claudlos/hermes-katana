name: CodeQL

# Audit finding E6: branch protection required the "Analyze (python)" and
# "Analyze (actions)" status checks, but no in-repo workflow produced them, so
# the rule could never be satisfied (or, if GitHub treated the missing context
# as not-required, silently provided no CodeQL coverage). This workflow emits
# exactly those job names ("Analyze (<language>)").

on:
  push:
    branches: [main, master, "release/**"]
  pull_request:
    branches: [main, master, "release/**"]
  schedule:
    - cron: "27 4 * * 1"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, actions]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          category: "/language:${{ matrix.language }}"
          # This repo also has GitHub's *default* CodeQL setup enabled, which
          # owns the code-scanning alert surface. An advanced workflow that
          # ALSO uploads SARIF is rejected ("analyses from advanced
          # configurations cannot be processed when the default setup is
          # enabled"). So this workflow runs the analysis to produce the
          # required "Analyze (python)/(actions)" status checks (audit finding
          # E6) but does not upload — default setup posts the alerts. To
          # consolidate later, disable default setup and flip this to
          # `upload: always`, or drop this workflow and require default
          # setup's "CodeQL" check in branch protection instead.
          upload: never
