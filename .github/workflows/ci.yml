name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run test suite
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          PYTHONPATH: src
        run: python -m pytest -p pytest_asyncio.plugin -q

  operator-contract:
    name: Operator Contract / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run operator contract tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          PYTHONPATH: src
        run: >
          python -m pytest -p pytest_asyncio.plugin -q
          tests/unit/test_compat_snapshots.py
          tests/unit/test_bootstrap.py
          tests/unit/test_installer.py
          tests/unit/test_cli.py
          tests/unit/test_proxy_runner.py
          tests/integration/test_cli_flow.py
          tests/integration/test_adversarial_eval_pack.py
