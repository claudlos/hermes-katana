name: CI

on:
  push:
    branches: [main, master, "release/**"]
  pull_request:
    branches: [main, master, "release/**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --no-cache-dir --upgrade pip==26.1.1
          python -m pip install --no-cache-dir -e ".[dev,security,fast-cpu,proving-ground]"
      - name: Ruff lint
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/
      - name: Generated policy assets check
        run: python scripts/generate_policy_assets.py --check
      - name: Mypy smoke
        run: scripts/mypy_smoke.sh

  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
        # Keep the Windows lane to a single Python until a Windows runner
        # baseline is established — that's enough to catch the cp1252
        # encoding bug class without tripling CI time. Expand once stable.
        exclude:
          - os: windows-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.11"
    # Force Bash for every step. GitHub Actions defaults to PowerShell on
    # windows-latest, which can't parse the `\` line-continuations used in
    # the multi-line `run:` blocks below. Git Bash is preinstalled on the
    # Windows runner, so `shell: bash` works uniformly across the matrix.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --no-cache-dir --upgrade pip==26.1.1
          python -m pip install --no-cache-dir -e ".[dev,security,fast-cpu,proving-ground]"
      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=hermes_katana \
            --cov-report=xml \
            --cov-report=term-missing \
            -v
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
