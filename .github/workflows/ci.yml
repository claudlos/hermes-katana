name: CI

on:
  push:
    branches: [main, master, "release/**"]
  pull_request:
    branches: [main, master, "release/**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --no-cache-dir --upgrade pip==26.1.1
          python -m pip install --no-cache-dir -e ".[dev,security,fast-cpu,proving-ground]"
      - name: Ruff lint
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/
      - name: Generated policy assets check
        run: python scripts/generate_policy_assets.py --check
      - name: Mypy smoke
        run: scripts/mypy_smoke.sh

  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
        # Keep the Windows lane to a single Python until a Windows runner
        # baseline is established — that's enough to catch the cp1252
        # encoding bug class without tripling CI time. Expand once stable.
        exclude:
          - os: windows-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.11"
    # Force Bash for every step. GitHub Actions defaults to PowerShell on
    # windows-latest, which can't parse the `\` line-continuations used in
    # the multi-line `run:` blocks below. Git Bash is preinstalled on the
    # Windows runner, so `shell: bash` works uniformly across the matrix.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --no-cache-dir --upgrade pip==26.1.1
          python -m pip install --no-cache-dir -e ".[dev,security,fast-cpu,proving-ground]"
      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=hermes_katana \
            --cov-report=xml \
            --cov-report=term-missing \
            -v
      - name: Detection gates (always-on, no external corpus)
        # Audit finding E2: keep an always-on detection lane so the security
        # claims are exercised on every run and "0 eval cases ran" is a hard
        # failure rather than a silent green check.
        run: |
          python tests/smoke/false_positive_gate.py
          pytest tests/smoke/test_smoke_corpus_eval.py tests/smoke/test_canonical_attack_recall.py -q
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
