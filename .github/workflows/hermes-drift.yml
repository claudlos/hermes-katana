name: Hermes Drift Check

# Source patches use exact-anchor matching against Hermes internals. This job
# applies them to the latest Hermes Agent on a schedule so upstream refactors
# that break our anchors surface as a red build with actionable output. When the
# latest Hermes commit has changed, the job also refreshes the pinned
# hermes-current compatibility snapshot and opens/updates a maintenance PR.

on:
  schedule:
    - cron: "0 12 * * 1" # Mondays 12:00 UTC
  workflow_dispatch:

concurrency:
  group: hermes-drift-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the elevated write scopes are granted only to the drift job
# that needs them (snapshot-refresh push + maintenance PR), not workflow-wide.
permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  drift:
    name: Patches apply to latest Hermes
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install hermes-katana
        run: |
          python -m pip install --no-cache-dir --upgrade pip==26.1.1
          python -m pip install --no-cache-dir -e ".[dev]"
      - name: Clone latest Hermes Agent
        run: git clone --depth 1 https://github.com/NousResearch/hermes-agent.git "${RUNNER_TEMP}/hermes-agent"
      - name: Check drift and auto-refresh snapshot PR
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          # Checkout no longer persists credentials (persist-credentials: false),
          # so wire the workflow token into git for the snapshot-refresh push.
          gh auth setup-git
          python scripts/hermes_drift_autorepair.py \
            --checkout "${RUNNER_TEMP}/hermes-agent" \
            --default-branch "${DEFAULT_BRANCH}" \
            --pr
