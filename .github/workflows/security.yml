name: Security Scans

on:
  push:
    branches: [main, master, "release/**"]
  pull_request:
    branches: [main, master, "release/**"]
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  python-sast:
    name: Python SAST
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install scanners
        run: |
          python -m pip install --no-cache-dir --upgrade pip==26.1.1
          python -m pip install --no-cache-dir "bandit[toml]==1.9.4" semgrep==1.163.0
      - name: Semgrep
        continue-on-error: true
        run: |
          mkdir -p security-reports
          semgrep scan \
            --metrics=off \
            --config p/python \
            --config p/owasp-top-ten \
            --config p/secrets \
            --sarif \
            --output security-reports/semgrep.sarif \
            src examples scripts
      - name: Upload Semgrep SARIF
        if: ${{ always() && hashFiles('security-reports/semgrep.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: semgrep
          sarif_file: security-reports/semgrep.sarif
      - name: Bandit
        continue-on-error: true
        run: |
          mkdir -p security-reports
          bandit -c pyproject.toml -r src examples scripts \
            --severity-level medium \
            --confidence-level medium \
            -f sarif \
            -o security-reports/bandit.sarif
      - name: Upload Bandit SARIF
        if: ${{ always() && hashFiles('security-reports/bandit.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: bandit
          sarif_file: security-reports/bandit.sarif
      - name: Upload Python SAST reports
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-sast-reports
          path: security-reports/
          if-no-files-found: ignore
          retention-days: 14

  python-dependencies:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: |
          python -m pip install --no-cache-dir --upgrade pip==26.1.1
          python -m pip install --no-cache-dir pip-audit==2.10.0
      - name: pip-audit JSON report
        continue-on-error: true
        run: |
          mkdir -p security-reports
          python -m pip_audit . \
            --progress-spinner=off \
            --format=json \
            --desc=auto \
            --output=security-reports/pip-audit.json
      - name: pip-audit Markdown report
        if: ${{ always() }}
        continue-on-error: true
        run: |
          mkdir -p security-reports
          python -m pip_audit . \
            --progress-spinner=off \
            --format=markdown \
            --desc=on \
            --output=security-reports/pip-audit.md
      - name: Upload dependency audit reports
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-dependency-audit
          path: security-reports/
          if-no-files-found: ignore
          retention-days: 14

  osv:
    name: OSV Dependency Scan
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      fail-on-vuln: false
      results-file-name: osv-scanner.sarif
      scan-args: |-
        --recursive
        ./

  workflow-hardening:
    name: GitHub Actions Hardening
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install zizmor
        run: |
          python -m pip install --no-cache-dir --upgrade pip==26.1.1
          python -m pip install --no-cache-dir zizmor==1.25.2
      - name: zizmor SARIF
        run: |
          mkdir -p security-reports
          zizmor --format=sarif . > security-reports/zizmor.sarif
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Upload zizmor SARIF
        if: ${{ always() && hashFiles('security-reports/zizmor.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: zizmor
          sarif_file: security-reports/zizmor.sarif
      - name: Upload workflow hardening report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: workflow-hardening-report
          path: security-reports/
          if-no-files-found: ignore
          retention-days: 14

  docker-hygiene:
    name: Docker Hygiene
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Prepare report directory
        run: mkdir -p security-reports
      - name: Hadolint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: docker/proving-ground/Dockerfile
          format: sarif
          output-file: security-reports/hadolint.sarif
          no-fail: true
      - name: Upload Hadolint SARIF
        if: ${{ always() && hashFiles('security-reports/hadolint.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: hadolint
          sarif_file: security-reports/hadolint.sarif
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: security-reports/trivy-fs.sarif
          exit-code: "0"
          skip-dirs: tests/fixtures,training,results,.pytest_tmp,.venv
          skip-files: .gitleaks.toml
      - name: Upload Trivy filesystem SARIF
        if: ${{ always() && hashFiles('security-reports/trivy-fs.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: trivy-fs
          sarif_file: security-reports/trivy-fs.sarif
      - name: Upload Docker hygiene reports
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docker-hygiene-reports
          path: security-reports/
          if-no-files-found: ignore
          retention-days: 14

  container-image:
    name: Container Image Scan
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Prepare report directory
        run: mkdir -p security-reports
      - name: Build proving ground image
        run: |
          docker build \
            -f docker/proving-ground/Dockerfile \
            -t hermes-katana-proving-ground:${{ github.sha }} \
            .
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: hermes-katana-proving-ground:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          format: sarif
          output: security-reports/trivy-image.sarif
          exit-code: "0"
      - name: Upload Trivy image SARIF
        if: ${{ always() && hashFiles('security-reports/trivy-image.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: trivy-image
          sarif_file: security-reports/trivy-image.sarif
      - name: Upload container image report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: container-image-report
          path: security-reports/
          if-no-files-found: ignore
          retention-days: 14

  scorecard:
    name: OpenSSF Scorecard
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard.json
          results_format: json
          publish_results: false
      - name: Upload Scorecard report
        if: ${{ always() && hashFiles('scorecard.json') != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openssf-scorecard-report
          path: scorecard.json
          if-no-files-found: ignore
          retention-days: 14

  deep-security-snapshot:
    name: Deep Security Snapshot
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install deep scan tools
        run: |
          python -m pip install --no-cache-dir --upgrade pip==26.1.1
          python -m pip install --no-cache-dir "bandit[toml]==1.9.4" semgrep==1.163.0 pip-audit==2.10.0 zizmor==1.25.2
      - name: Prepare deep scan report
        run: |
          mkdir -p security-reports/deep
          cat > security-reports/deep/README.md <<'EOF'
          # Deep Security Snapshot

          This scheduled/manual report is artifact-only. Do not upload these
          results as SARIF unless a tool is producing actionable code findings
          with low enough noise for the code-scanning alert queue.
          EOF
      - name: Semgrep deep JSON
        continue-on-error: true
        run: |
          semgrep scan \
            --metrics=off \
            --config p/python \
            --config p/owasp-top-ten \
            --config p/secrets \
            --json-output security-reports/deep/semgrep.json \
            .
      - name: Bandit deep JSON
        continue-on-error: true
        run: |
          bandit -c pyproject.toml -r src examples scripts \
            --severity-level low \
            --confidence-level low \
            -f json \
            -o security-reports/deep/bandit.json
      - name: pip-audit deep JSON
        continue-on-error: true
        run: |
          python -m pip_audit . \
            --progress-spinner=off \
            --format=json \
            --desc=auto \
            --output=security-reports/deep/pip-audit.json
      - name: zizmor deep JSON
        continue-on-error: true
        run: zizmor --format=json . > security-reports/deep/zizmor.json
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Trivy deep filesystem JSON
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig,license
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: false
          format: json
          output: security-reports/deep/trivy-fs.json
          exit-code: "0"
          skip-dirs: tests/fixtures,training,results,.pytest_tmp,.venv
          skip-files: .gitleaks.toml
      - name: Upload deep security snapshot
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deep-security-snapshot
          path: security-reports/deep/
          if-no-files-found: ignore
          retention-days: 30
