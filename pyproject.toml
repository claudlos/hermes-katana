[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hermes-katana"
version = "0.1.0"
description = "Defense-in-depth security toolkit for Hermes Agent — CaMeL taint tracking, proxy-based secret guard, policy engine, and red-team benchmarking"
authors = [{name = "Carlos", email = "account-holder@example.com"}]
requires-python = ">=3.10"
license = {text = "MIT"}
readme = "README.md"
keywords = ["llm", "security", "prompt-injection", "taint-tracking", "hermes"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Security",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "click>=8.0",
    "cryptography>=41.0",
    "keyring>=24.0",
    "mitmproxy>=10.0",
    "pyyaml>=6.0",
    "requests>=2.32.5",
    "pydantic>=2.0",
    "rich>=13.0",
]

[project.optional-dependencies]
container = ["docker>=7.0"]
benchmark = ["agentdojo>=0.1"]
ml = ["scikit-learn>=1.3", "numpy>=1.24"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.0",
    "responses>=0.26.0",
    "docker>=7.0",
    "ruff>=0.4",
]
all = ["hermes-katana[container,benchmark,ml,dev]"]

[project.scripts]
hermes-katana = "hermes_katana.cli.main:main"
katana = "hermes_katana.cli.main:main"

[tool.hatch.build.targets.wheel]
packages = ["src/hermes_katana"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py310"
line-length = 120
