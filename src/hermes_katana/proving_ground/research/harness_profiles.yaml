schema_version: 1

# Seeded from observed agent_ids in results/agent_shard_runs/ + agent_cli_runner
# inspection. Edit in-place when new agents land.
#
# Booleans reflect the harness AS USED in this project's fleet. If a harness
# is configurable (e.g. Claude Code's permissions can be relaxed via flags),
# the profile reflects what OUR runner actually invoked. See
# sandbox/agent_cli_runner.py for the CLI flags per agent.

agents:

  # ---------------- Claude (Anthropic) ----------------
  claude_cli:
    model_family: claude
    model_size: large         # default Claude Code model (often Sonnet)
    harness_type: cli_coding_agent
    instruction_hier: true
    bash_allowlist: strict    # tool approval gates by default
    untrusted_marker: true
    permission_gate: true     # --dangerously-skip-permissions OFF in our default runs
    scanner_layer: false
    tool_auto_exec: false
    multi_turn: false         # we invoke --print (non-interactive one-shot)
    notes: "Claude Code CLI default (model auto-selected)"
  claude_cli_sonnet:
    model_family: claude
    model_size: large
    harness_type: cli_coding_agent
    instruction_hier: true
    bash_allowlist: strict
    untrusted_marker: true
    permission_gate: false    # we pass --dangerously-skip-permissions for fleet runs
    scanner_layer: false
    tool_auto_exec: true
    multi_turn: false
    notes: "Claude Code CLI pinned to Sonnet; --dangerously-skip-permissions for fleet throughput"
  claude_cli_haiku:
    model_family: claude
    model_size: small
    harness_type: cli_coding_agent
    instruction_hier: true
    bash_allowlist: strict
    untrusted_marker: true
    permission_gate: false
    scanner_layer: false
    tool_auto_exec: true
    multi_turn: false
    notes: "Claude Code CLI pinned to Haiku; permissions skipped for fleet"

  hermes_claude_haiku:
    model_family: claude
    model_size: small
    harness_type: hermes_agent
    instruction_hier: false     # Hermes has flatter system prompt
    bash_allowlist: loose
    untrusted_marker: false
    permission_gate: false
    scanner_layer: false
    tool_auto_exec: true
    multi_turn: true
    notes: "Claude-Haiku accessed through Hermes agent harness (flat tool registry)"

  hermes_or_claude_sonnet_4_6:
    model_family: claude
    model_size: large
    harness_type: openrouter_relay
    instruction_hier: false
    bash_allowlist: none
    untrusted_marker: false
    permission_gate: false
    scanner_layer: false
    tool_auto_exec: true
    multi_turn: true
    notes: "Claude Sonnet via OpenRouter → Hermes; no Claude Code permission layer"

  # ---------------- OpenAI ----------------
