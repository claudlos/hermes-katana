    value: -0.1844
  verdict: supported
  notes: 'Paired n=4453 across 5 model-family pairs (hermes_claude_haiku, hermes_or_gpt4o_mini, hermes_nous_step_flash, hermes_nous_kimi_k2_6,
    hermes_minimax_m2_7). Bare=22.91% CI[21.70,24.16], Katana=4.47% CI[3.90,5.12], delta=+18.44pp CI[17.25,19.69]. McNemar
    p<<1e-6. Cohen''s h=+0.572. Per-channel: code_comment 49.82->1.51, file_content 28.31->9.91, tool_output 8.95->4.14, data_row
    2.17->1.79 (ns). Scanner threshold=0.5 (preregistered primary).'
